<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grouse Grind</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, 'Helvetica Neue', sans-serif; }

#app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }

#viewport { flex: 1; position: relative; overflow: hidden; }
#video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
#video.hidden-feed { opacity: 0; }
#skeleton { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; transform: scaleX(-1); }
#yt-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.5; pointer-events: none; z-index: 2; }
#yt-player iframe { width: 100%; height: 100%; }

#menu-trigger { position: absolute; top: 16px; left: 16px; z-index: 10; cursor: pointer; user-select: none; }
#menu-trigger h1 { font-size: 14px; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 2px 6px rgba(0,0,0,0.7); }
#menu-trigger .tagline { font-size: 9px; color: #FF6B35; font-weight: 800; letter-spacing: 2px; text-shadow: 0 2px 6px rgba(0,0,0,0.7); }

#settings-panel { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: rgba(10,10,10,0.92); backdrop-filter: blur(8px); z-index: 100; padding: 60px 20px 20px; display: none; overflow-y: auto; pointer-events: auto; }
#settings-panel.open { display: block; }
#settings-panel .close-btn { position: absolute; top: 16px; right: 16px; color: #64748B; font-size: 20px; cursor: pointer; background: none; border: none; padding: 4px 8px; }
#settings-panel .close-btn:hover { color: #fff; }
#settings-overlay { position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,0.4); display: none; }
#settings-overlay.open { display: block; }
.setting-group { margin-bottom: 16px; }
.setting-label { color: #64748B; font-size: 9px; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 6px; text-transform: uppercase; }
.setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.setting-row label { color: #CBD5E1; font-size: 13px; }
.setting-row input[type="number"] { width: 64px; background: #1A1A2E; border: 1px solid #2A2A3E; color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 13px; font-weight: 700; text-align: center; }
.setting-row input[type="range"] { width: 100%; accent-color: #FF6B35; }
.setting-toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.setting-toggle input { opacity: 0; width: 0; height: 0; }
.setting-toggle .slider { position: absolute; inset: 0; background: #1A1A2E; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
.setting-toggle .slider::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #475569; border-radius: 50%; transition: transform 0.2s, background 0.2s; }
.setting-toggle input:checked + .slider { background: #FF6B35; }
.setting-toggle input:checked + .slider::after { transform: translateX(16px); background: #fff; }
.setting-hint { color: #475569; font-size: 10px; margin-top: 2px; }

#loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.92); z-index: 20; transition: opacity 0.5s; }
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 36px; height: 36px; border: 3px solid #1A1A2E; border-top-color: #FF6B35; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: #FF6B35; font-weight: 900; font-size: 13px; letter-spacing: 1.5px; margin-top: 16px; }
#loading .sub { color: #64748B; font-size: 11px; margin-top: 6px; }

#indicator { position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%); z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.2s, transform 0.2s; }
#indicator.show { opacity: 1; }
#indicator span { color: #FF6B35; font-size: 28px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

#quote { position: absolute; bottom: 50%; left: 16px; right: 16px; z-index: 6; pointer-events: none; text-align: center; transform: translateY(50%); }
#quote-text { color: #fff; font-size: 64px; font-weight: 900; font-style: normal; opacity: 0.22; letter-spacing: 1px; line-height: 1.2; max-width: 90%; margin: 0 auto; text-shadow: 0 6px 24px rgba(0,0,0,0.9); text-transform: uppercase; }

#celly { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 12; pointer-events: none; opacity: 0; transition: opacity 0.4s; }
#celly.show { opacity: 1; }
#celly-text { color: #FFD700; font-size: 48px; font-weight: 900; text-shadow: 0 4px 24px rgba(0,0,0,0.95); transform: scale(0.3); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.4); }
#celly.show #celly-text { transform: scale(1); }
#celly.big { background: rgba(0,0,0,0.6); }
#celly.big #celly-text { font-size: 56px; animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

#permit { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #0A0A0A; z-index: 15; }
#permit.hidden { display: none; }
#permit button { background: #FF6B35; border: none; color: #fff; font-weight: 900; font-size: 13px; letter-spacing: 2px; padding: 14px 32px; border-radius: 12px; cursor: pointer; }

#error { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.92); z-index: 25; }
#error.show { display: flex; }
#error p { color: #EF4444; font-weight: 700; font-size: 14px; text-align: center; margin: 0 32px; }

#hud { display: flex; background: rgba(10,10,10,0.95); border-top: 1px solid #1A1A2E; padding: 12px 8px; z-index: 10; }
.hud-item { flex: 1; text-align: center; }
.hud-label { color: #64748B; font-size: 9px; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 2px; }
.hud-value { color: #fff; font-size: 24px; font-weight: 900; }
.hud-value .muted { color: #475569; font-size: 16px; }
.hud-sub { color: #475569; font-size: 9px; font-weight: 700; letter-spacing: 1px; margin-top: 1px; }
.hud-divider { width: 1px; background: #1A1A2E; margin: 4px 0; }
.hud-progress { width: 40px; height: 3px; background: #1A1A2E; border-radius: 2px; margin: 4px auto 0; overflow: hidden; }
.hud-progress-fill { height: 100%; background: #FF6B35; transition: width 0.3s; }

#progress-bar { height: 4px; background: #1A1A2E; }
#progress-fill { height: 100%; background: #FF6B35; transition: width 0.3s; }
#ticker-wrap { height: 40px; background: rgba(10,10,10,0.95); border-top: 1px solid #1A1A2E; overflow: hidden; }
#news-ticker { height: 22px; background: rgba(5,5,15,0.95); border-top: 1px solid #1A1A2E; overflow: hidden; position: relative; }
#news-scroll { white-space: nowrap; overflow: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#news-text { display: inline-block; color: #CBD5E1; font-size: 14px; font-weight: 500; line-height: 22px; padding-left: 100%; animation: marquee 180s linear infinite; letter-spacing: 0.3px; }
#news-ticker:hover #news-text { animation-play-state: paused; }
@keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
</style>
</head>
<body>
<div id="app">
  <div id="viewport">
    <iframe id="yt-player" src="https://www.youtube.com/embed/ft1pE3J7cZU?mute=1&controls=0&loop=1&playsinline=1&rel=0&iv_load_policy=3&fs=0&enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="skeleton"></canvas>

    <div id="menu-trigger">
      <h1>GROUSE GRIND</h1>
      <div class="tagline">METABOLIC</div>
    </div>
    <div id="settings-panel">
      <button class="close-btn" id="settings-close">✕</button>
      <div class="setting-group">
        <div class="setting-label">Target</div>
        <div class="setting-row">
          <label>Calories</label>
          <input type="number" id="setting-calories" value="500" min="100" max="2000">
        </div>
        <div class="setting-row">
          <label>Weight (kg)</label>
          <input type="number" id="setting-weight" value="75" min="30" max="300">
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Display</div>
        <div class="setting-row">
          <label>YouTube Opacity</label>
          <span style="color:#475569;font-size:11px;font-weight:700;" id="setting-yt-opacity-val">50%</span>
        </div>
        <div class="setting-row">
          <input type="range" id="setting-yt-opacity" min="0" max="100" value="50">
        </div>
        <div class="setting-row">
          <label>Show Skeleton</label>
          <label class="setting-toggle"><input type="checkbox" id="setting-skeleton" checked><span class="slider"></span></label>
        </div>
        <div class="setting-row">
          <label>Show News</label>
          <label class="setting-toggle"><input type="checkbox" id="setting-news" checked><span class="slider"></span></label>
        </div>
        <div class="setting-row">
          <label>Stock Ticker</label>
          <label class="setting-toggle"><input type="checkbox" id="setting-ticker" checked><span class="slider"></span></label>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Music</div>
        <div class="setting-row" style="flex-wrap:wrap;">
          <label>YouTube URL</label>
          <input type="text" id="setting-music-url" placeholder="https://youtube.com/watch?v=..." style="width:100%;margin-top:6px;background:#1A1A2E;border:1px solid #2A2A3E;color:#CBD5E1;padding:6px 8px;border-radius:6px;font-size:12px;">
          <div class="setting-hint" style="width:100%;">Plays in background, trail video stays muted</div>
        </div>
      </div>
    </div>

    <div id="music-player" style="position:absolute;width:0;height:0;overflow:hidden;pointer-events:none;z-index:-1;">
      <iframe id="music-frame" src="" allow="autoplay; encrypted-media" style="width:1px;height:1px;"></iframe>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p id="load-text">LOADING POSE MODEL</p>
      <div class="sub">TF.js WebGL</div>
    </div>

    <div id="quote"><span id="quote-text"></span></div>

    <div id="permit" class="hidden">
      <button id="start-cam">ENABLE CAMERA</button>
    </div>

    <div id="error">
      <p id="error-text"></p>
    </div>

    <div id="indicator"><span id="indicator-value">+0</span></div>
    <div id="celly"><span id="celly-text"></span></div>
  </div>

  <div id="settings-overlay"></div>

  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">CALORIES</div>
      <div class="hud-value" id="hud-cal">0</div>
      <div class="hud-sub">/ <span id="hud-cal-target">500</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-item">
      <div class="hud-label">INTENSITY</div>
      <div class="hud-value" id="hud-met">1.0</div>
      <div class="hud-sub">MET</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-item">
      <div class="hud-label">ELAPSED</div>
      <div class="hud-value" id="hud-time">00:00</div>
      <div class="hud-sub">MIN</div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-item">
      <div class="hud-label">TRAIL</div>
      <div class="hud-value" id="hud-progress-pct">0<span class="muted">%</span></div>
      <div class="hud-progress"><div class="hud-progress-fill" id="hud-progress-bar"></div></div>
    </div>
  </div>

  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="ticker-wrap"><div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div><script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>{"symbols":[{"description":"US100","proName":"FOREXCOM:NSXUSD"},{"description":"AAPL","proName":"NASDAQ:AAPL"},{"description":"MSFT","proName":"NASDAQ:MSFT"},{"description":"GOOGL","proName":"NASDAQ:GOOGL"},{"description":"AMZN","proName":"NASDAQ:AMZN"},{"description":"NVDA","proName":"NASDAQ:NVDA"},{"description":"META","proName":"NASDAQ:META"},{"description":"TSLA","proName":"NASDAQ:TSLA"},{"description":"PLTR","proName":"NASDAQ:PLTR"},{"description":"MU","proName":"NASDAQ:MU"},{"description":"WDC","proName":"NASDAQ:WDC"},{"description":"TSM","proName":"NYSE:TSM"},{"description":"SPCX","proName":"NASDAQ:SPCX"},{"description":"SOXL","proName":"AMEX:SOXL"},{"description":"QBTS","proName":"NYSE:QBTS"},{"description":"AVGO","proName":"NASDAQ:AVGO"}],"showSymbolLogo":true,"colorTheme":"dark","isTransparent":true,"displayMode":"adaptive","locale":"en"}</script></div></div>
  <div id="news-ticker"><div id="news-scroll"><span id="news-text">Loading news...</span></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
(async function() {
  const YT_VIDEO_ID = 'ft1pE3J7cZU';
  const VIDEO_LENGTH = 3255;
  let TARGET_CALORIES = parseInt(localStorage.getItem('setting-calories')) || 500;
  let WEIGHT_KG = parseFloat(localStorage.getItem('setting-weight')) || 75;
  async function loadDailyQuote() {
    const today = new Date().toDateString();
    const cached = localStorage.getItem('daily-quote');
    const cachedDate = localStorage.getItem('daily-quote-date');
    if (cached && cachedDate === today) {
      document.getElementById('quote-text').textContent = cached;
      return;
    }
    try {
      const r = await fetch('https://api.quotable.io/random?maxLength=120');
      const data = await r.json();
      const quote = data.content + ' — ' + data.author;
      document.getElementById('quote-text').textContent = quote;
      localStorage.setItem('daily-quote', quote);
      localStorage.setItem('daily-quote-date', today);
    } catch (_) {
      document.getElementById('quote-text').textContent = 'The only way out is through. — Frost';
    }
  }
  loadDailyQuote();

  const video = document.getElementById('video');
  const viewport = document.getElementById('viewport');
  viewport.addEventListener('click', () => video.classList.toggle('hidden-feed'));
  const canvas = document.getElementById('skeleton');
  const ctx = canvas.getContext('2d');
  const loading = document.getElementById('loading');
  const permit = document.getElementById('permit');
  const startBtn = document.getElementById('start-cam');
  const error = document.getElementById('error');
  const errorText = document.getElementById('error-text');
  const indicator = document.getElementById('indicator');
  const indicatorValue = document.getElementById('indicator-value');
  const hudCal = document.getElementById('hud-cal');
  const hudCalTarget = document.getElementById('hud-cal-target');
  const hudMet = document.getElementById('hud-met');
  const hudTime = document.getElementById('hud-time');
  const hudProgressPct = document.getElementById('hud-progress-pct');
  const hudProgressBar = document.getElementById('hud-progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const cellyEl = document.getElementById('celly');
  const cellyText = document.getElementById('celly-text');

  let detector = null;
  let cameraStream = null;
  let animFrameId = null;
  let cumulativeCalories = parseFloat(localStorage.getItem('grind-calories')) || 0;
  let prevCalories = cumulativeCalories;
  let lastHip = null;
  let lastTimestamp = null;
  let totalDuration = parseInt(localStorage.getItem('grind-duration')) || 0;
  let maxSeekSecond = parseFloat(localStorage.getItem('grind-seek')) || 0;
  let indicatorTimer = null;
  let prevTime = 0;
  let hipHistory = [];
  let milestonesHit = new Set(localStorage.getItem('grind-milestones') ? JSON.parse(localStorage.getItem('grind-milestones')) : []);
  let musicStartTime = parseInt(localStorage.getItem('grind-music-start')) || null;
  const FRAME_INTERVAL = 80;

  hudCalTarget.textContent = TARGET_CALORIES;

  // Settings menu
  const menuTrigger = document.getElementById('menu-trigger');
  const settingsPanel = document.getElementById('settings-panel');
  const settingsClose = document.getElementById('settings-close');
  const settingsOverlay = document.getElementById('settings-overlay');

  function saveSetting(key, value) {
    localStorage.setItem(key, String(value));
  }

  function toggleSettings(show) {
    settingsPanel.classList.toggle('open', show);
    settingsOverlay.classList.toggle('open', show);
  }

  menuTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleSettings(!settingsPanel.classList.contains('open'));
  });
  settingsClose.addEventListener('click', () => toggleSettings(false));
  settingsOverlay.addEventListener('click', () => toggleSettings(false));

  const settingCalories = document.getElementById('setting-calories');
  const settingWeight = document.getElementById('setting-weight');
  const settingYtOpacity = document.getElementById('setting-yt-opacity');
  const settingYtOpacityVal = document.getElementById('setting-yt-opacity-val');
  const settingSkeleton = document.getElementById('setting-skeleton');
  const settingNews = document.getElementById('setting-news');
  const settingTicker = document.getElementById('setting-ticker');
  const settingMusicUrl = document.getElementById('setting-music-url');
  const musicFrame = document.getElementById('music-frame');
  const ytPlayer = document.getElementById('yt-player');
  const skeletonCanvas = document.getElementById('skeleton');
  const tickerWrap = document.getElementById('ticker-wrap');
  const newsTicker = document.getElementById('news-ticker');

  settingCalories.value = TARGET_CALORIES;
  settingWeight.value = WEIGHT_KG;

  settingCalories.addEventListener('change', () => {
    TARGET_CALORIES = parseInt(settingCalories.value) || 500;
    hudCalTarget.textContent = TARGET_CALORIES;
    saveSetting('setting-calories', TARGET_CALORIES);
  });
  settingWeight.addEventListener('change', () => {
    WEIGHT_KG = parseFloat(settingWeight.value) || 75;
    saveSetting('setting-weight', WEIGHT_KG);
  });
  settingYtOpacity.addEventListener('input', () => {
    const v = settingYtOpacity.value;
    settingYtOpacityVal.textContent = v + '%';
    ytPlayer.style.opacity = v / 100;
    saveSetting('setting-yt-opacity', v);
  });
  settingYtOpacity.value = localStorage.getItem('setting-yt-opacity') || '50';
  settingYtOpacityVal.textContent = settingYtOpacity.value + '%';
  ytPlayer.style.opacity = settingYtOpacity.value / 100;

  settingSkeleton.checked = localStorage.getItem('setting-skeleton') !== 'false';
  skeletonCanvas.style.display = settingSkeleton.checked ? '' : 'none';
  settingSkeleton.addEventListener('change', () => {
    skeletonCanvas.style.display = settingSkeleton.checked ? '' : 'none';
    saveSetting('setting-skeleton', settingSkeleton.checked);
  });

  settingNews.checked = localStorage.getItem('setting-news') !== 'false';
  newsTicker.style.display = settingNews.checked ? '' : 'none';
  settingNews.addEventListener('change', () => {
    newsTicker.style.display = settingNews.checked ? '' : 'none';
    saveSetting('setting-news', settingNews.checked);
  });

  settingTicker.checked = localStorage.getItem('setting-ticker') !== 'false';
  tickerWrap.style.display = settingTicker.checked ? '' : 'none';
  settingTicker.addEventListener('change', () => {
    tickerWrap.style.display = settingTicker.checked ? '' : 'none';
    saveSetting('setting-ticker', settingTicker.checked);
  });

  function extractVideoId(url) {
    const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  settingMusicUrl.value = localStorage.getItem('setting-music-url') || '';
  if (settingMusicUrl.value) applyMusicUrl(settingMusicUrl.value);
  settingMusicUrl.addEventListener('change', () => {
    const val = settingMusicUrl.value.trim();
    saveSetting('setting-music-url', val);
    musicStartTime = null;
    if (val) applyMusicUrl(val);
    else musicFrame.src = '';
  });

  function applyMusicUrl(url) {
    const id = extractVideoId(url);
    if (id) {
      const offset = musicStartTime ? Math.floor((Date.now() - musicStartTime) / 1000) : 0;
      musicFrame.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1&loop=1&playlist=' + id + '&controls=0&showinfo=0&iv_load_policy=3&rel=0&enablejsapi=1' + (offset > 0 ? '&start=' + offset : '');
    }
  }

  function startMusic() {
    if (musicFrame.src && musicFrame.src.includes('youtube.com/embed/')) {
      if (!musicStartTime) musicStartTime = Date.now();
      musicFrame.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'playVideo', args: '' }), '*');
    }
  }

  function saveState() {
    localStorage.setItem('grind-calories', cumulativeCalories.toFixed(2));
    localStorage.setItem('grind-duration', totalDuration);
    localStorage.setItem('grind-seek', maxSeekSecond);
    localStorage.setItem('grind-milestones', JSON.stringify([...milestonesHit]));
    if (musicStartTime) localStorage.setItem('grind-music-start', musicStartTime);
  }
  setInterval(saveState, 5000);

  function restoreState() {
    const trailEl = document.getElementById('yt-player');
    const trySeekTrail = () => {
      if (trailEl && trailEl.contentWindow && maxSeekSecond > 5) {
        trailEl.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'seekTo', args: [maxSeekSecond, true] }), '*');
        trailEl.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'pauseVideo', args: '' }), '*');
      }
    };
    for (let i = 0; i < 10; i++) setTimeout(trySeekTrail, (i + 1) * 1000);
  }
  restoreState();

  function ytCommand(func, args) {
    const el = document.getElementById('yt-player');
    if (el && el.contentWindow) {
      el.contentWindow.postMessage(JSON.stringify({ event: 'command', func, args: args || '' }), '*');
    }
  }

  function triggerCelly(pct) {
    const labels = { 25: '25%', 50: 'HALFWAY', 75: '75%', 100: 'COMPLETE!' };
    cellyText.textContent = labels[pct] || pct + '%';
    cellyEl.className = pct === 100 ? 'big show' : 'show';
    clearTimeout(indicatorTimer);
    indicatorTimer = setTimeout(() => { cellyEl.className = ''; cellyEl.classList.remove('show', 'big'); }, pct === 100 ? 5000 : 2000);
  }

  function syncVideo(calories, isActive) {
    const ratio = Math.min(Math.max(calories / TARGET_CALORIES, 0), 1);
    const targetSecond = ratio * VIDEO_LENGTH;
    if (!isActive || ratio >= 1) {
      ytCommand('pauseVideo');
    } else {
      if (targetSecond > maxSeekSecond + 3) {
        ytCommand('seekTo', [targetSecond, true]);
        maxSeekSecond = targetSecond;
      }
      ytCommand('playVideo');
    }
  }

  function updateCalories(hip) {
    const now = performance.now();
    let velocity = 0;
    let metValue = 1.0;
    if (hip.score !== undefined && hip.score < 0.5) {
      hipHistory = [];
      return { metValue: 1.0, velocity: 0, cumulativeCalories };
    }
    hipHistory.push({ x: hip.x, y: hip.y, z: hip.z || 0, t: now });
    if (hipHistory.length > 5) hipHistory.shift();
    if (hipHistory.length < 2) { lastTimestamp = now; return { metValue: 1.0, velocity: 0, cumulativeCalories }; }
    const first = hipHistory[0];
    const dt = (now - first.t) / 1000;
    if (dt > 0.1) {
      const dx = hip.x - first.x;
      const dy = hip.y - first.y;
      const dz = (hip.z || 0) - first.z;
      const displacement = Math.sqrt(dx*dx + dy*dy + dz*dz);
      velocity = displacement / dt;
      if (velocity > 40) metValue = 7.0;
      else if (velocity > 15) metValue = 4.0;
      else metValue = 1.0;
      if (metValue > 1.0) {
        const calPerSec = ((metValue * 3.5 * WEIGHT_KG) / 200) / 60;
        cumulativeCalories += calPerSec * dt;
      }
    }
    lastTimestamp = now;
    return { metValue, velocity, cumulativeCalories };
  }

  async function loadModel() {
    loading.classList.remove('hidden');
    document.getElementById('load-text').textContent = 'LOADING POSE MODEL';
    try {
      await tf.setBackend('webgl');
      detector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        { modelType: poseDetection.movenet.modelType.SINGLEPOSE_THUNDER }
      );
      loading.classList.add('hidden');
      if (cameraStream) startLoop();
    } catch (err) {
      showError('Failed to load pose model: ' + err.message);
    }
  }

  async function startCamera() {
    permit.classList.add('hidden');
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false,
      });
      video.srcObject = cameraStream;
      await video.play();

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      if (detector) startLoop();
      else loadModel();
    } catch (err) {
      if (err.name === 'NotAllowedError') permit.classList.remove('hidden');
      else showError('Camera error: ' + err.message);
    }
  }

  startBtn.addEventListener('click', () => { startMusic(); startCamera(); });

  const CONNECTIONS = [
    ['nose', 'left_eye'], ['nose', 'right_eye'],
    ['left_eye', 'left_ear'], ['right_eye', 'right_ear'],
    ['nose', 'left_shoulder'], ['nose', 'right_shoulder'],
    ['left_shoulder', 'right_shoulder'],
    ['left_shoulder', 'left_elbow'], ['right_shoulder', 'right_elbow'],
    ['left_elbow', 'left_wrist'], ['right_elbow', 'right_wrist'],
    ['left_shoulder', 'left_hip'], ['right_shoulder', 'right_hip'],
    ['left_hip', 'right_hip'],
    ['left_hip', 'left_knee'], ['right_hip', 'right_knee'],
    ['left_knee', 'left_ankle'], ['right_knee', 'right_ankle'],
  ];

  const JOINT_COLORS = {
    nose: '#FFFFFF', left_eye: '#FFFFFF', right_eye: '#FFFFFF',
    left_ear: '#FFFFFF', right_ear: '#FFFFFF',
    left_shoulder: '#FF6B35', right_shoulder: '#FF6B35',
    left_elbow: '#FFB800', right_elbow: '#FFB800',
    left_wrist: '#FFB800', right_wrist: '#FFB800',
    left_hip: '#FF6B35', right_hip: '#FF6B35',
    left_knee: '#10B981', right_knee: '#10B981',
    left_ankle: '#10B981', right_ankle: '#10B981',
  };

  function drawSkeleton(keypoints) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!keypoints) return;

    const kp = {};
    for (const p of keypoints) {
      kp[p.name] = p;
    }

    // Draw connections
    ctx.strokeStyle = 'rgba(255, 107, 53, 0.7)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    for (const [a, b] of CONNECTIONS) {
      const p1 = kp[a], p2 = kp[b];
      if (p1 && p2 && p1.score > 0.3 && p2.score > 0.3) {
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    }

    // Draw joints
    for (const p of keypoints) {
      if (p.score < 0.3) continue;
      ctx.fillStyle = JOINT_COLORS[p.name] || '#FFFFFF';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.name === 'nose' ? 3 : 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function getAvgHip(keypoints) {
    const l = keypoints.find(p => p.name === 'left_hip');
    const r = keypoints.find(p => p.name === 'right_hip');
    if (!l || !r) return null;
    return {
      x: (l.x + r.x) / 2,
      y: (l.y + r.y) / 2,
      z: ((l.z || 0) + (r.z || 0)) / 2,
      score: (l.score + r.score) / 2,
    };
  }

  function startLoop() {
    async function frame(time) {
      animFrameId = requestAnimationFrame(frame);
      if (time - prevTime < FRAME_INTERVAL) return;
      prevTime = time;
      if (!detector || !video.videoWidth) return;

      try {
        const poses = await detector.estimatePoses(video);
        if (!poses || poses.length === 0) { drawSkeleton(null); return; }

        const kp = poses[0].keypoints;
        drawSkeleton(kp);

        const hip = getAvgHip(kp);
        if (!hip) return;

        const energy = updateCalories(hip);
        const delta = energy.cumulativeCalories - prevCalories;
        prevCalories = energy.cumulativeCalories;

        if (delta > 0.2) {
          indicatorValue.textContent = '+' + Math.round(delta);
          indicator.classList.add('show');
          clearTimeout(indicatorTimer);
          indicatorTimer = setTimeout(() => indicator.classList.remove('show'), 1500);
        }

        const isActive = energy.metValue > 1.0;
        if (isActive) totalDuration++;

        hudCal.textContent = energy.cumulativeCalories.toFixed(0);
        hudMet.textContent = energy.metValue.toFixed(1);
        const m = Math.floor(totalDuration / 60);
        const s = totalDuration % 60;
        hudTime.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        const pct = Math.min((energy.cumulativeCalories / TARGET_CALORIES) * 100, 100);
        for (const m of [25, 50, 75, 100]) { if (!milestonesHit.has(m) && pct >= m) { milestonesHit.add(m); triggerCelly(m); } }
        hudProgressPct.innerHTML = pct.toFixed(0) + '<span class="muted">%</span>';
        hudProgressBar.style.width = pct + '%';
        progressFill.style.width = pct + '%';
        syncVideo(energy.cumulativeCalories, isActive);
      } catch (e) {}
    }
    animFrameId = requestAnimationFrame(frame);
  }

  function showError(msg) {
    errorText.textContent = msg;
    error.classList.add('show');
    loading.classList.add('hidden');
  }

  async function fetchNews() {
    try {
      const [mwRes, yfRes, bbRes] = await Promise.all([
        fetch('https://api.rss2json.com/v1/api.json?rss_url=https://feeds.content.dowjones.io/public/rss/mw_topstories').catch(() => null),
        fetch('https://api.rss2json.com/v1/api.json?rss_url=https://finance.yahoo.com/news/rssindex').catch(() => null),
        fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.bloomberg.com/feeds/markets').catch(() => null),
      ]);
      let items = [];
      if (mwRes && mwRes.ok) {
        const d = await mwRes.json();
        if (d.items) items.push(...d.items.slice(0, 6).map(i => ({ title: i.title, url: i.link })));
      }
      if (yfRes && yfRes.ok) {
        const d = await yfRes.json();
        if (d.items) items.push(...d.items.slice(0, 6).map(i => ({ title: i.title, url: i.link })));
      }
      if (bbRes && bbRes.ok) {
        const d = await bbRes.json();
        if (d.items) items.push(...d.items.slice(0, 6).map(i => ({ title: i.title, url: i.link })));
      }
      if (items.length) {
        // Interleave for variety
        items.sort(() => Math.random() - 0.5);
        const html = items.map(({title, url}) => `<a href="${url}" target="_blank" rel="noopener" style="color:#CBD5E1;text-decoration:none;">${title}</a>`).join(' <span style="color:#475569;">◆</span> ');
        document.getElementById('news-text').innerHTML = html + ' <span style="color:#475569;">◆</span> ' + html;
      } else {
        document.getElementById('news-text').textContent = ' ◆ Financial news unavailable ◆ ';
      }
    } catch (_) {
      document.getElementById('news-text').textContent = ' ◆ Financial news unavailable ◆ ';
    }
  }
  fetchNews();
  setInterval(fetchNews, 120000);

  startCamera();
})();
</script>
